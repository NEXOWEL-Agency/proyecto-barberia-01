<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Citas | Nexowel Admin</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; padding: 40px; }
        h1 { color: #C5A059; border-bottom: 2px solid #C5A059; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #333; }
        th { background: #1a1a1a; color: #C5A059; }
        .btn-ws { background: #25D366; color: white; padding: 8px 12px; text-decoration: none; border-radius: 4px; font-size: 0.8rem; }
    </style>
</head>
<body>
    <h1>GESTIÓN DE CITAS - NEXOWEL</h1>
    <table id="tablaCitas">
        <thead>
            <tr>
                <th>Cliente</th>
                <th>Servicio</th>
                <th>Fecha/Hora</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>

    <script>
        async function cargarCitas() {
            const res = await fetch('https://cli-barberia-01-api.nexowel.workers.dev/');
            const citas = await res.json();
            const tabla = document.querySelector('#tablaCitas tbody');
            
            tabla.innerHTML = citas.map(c => `
                <tr>
                    <td>${c.nombre}</td>
                    <td>${c.servicio}</td>
                    <td>${new Date(c.fecha_hora).toLocaleString()}</td>
                    <td><a href="https://wa.me/${c.telefono}?text=Hola ${c.nombre}, te recordamos tu cita" class="btn-ws" target="_blank">WhatsApp</a></td>
                </tr>
            `).join('');
        }
        cargarCitas();
    </script>
</body>
</html>
