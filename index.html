<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Gentry | Barbería de Élite</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Playfair+Display:ital,wght@0,400;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-matte: #121212;
            --gold-matte: #C5A059;
            --text-matte: #EEEEEE;
            --ease: cubic-bezier(0.23, 1, 0.32, 1);
        }

        body { background-color: var(--bg-matte); color: var(--text-matte); font-family: 'Arial', sans-serif; margin: 0; overflow-x: hidden; scroll-behavior: smooth; }

        header { height: 100vh; display: grid; grid-template-columns: 1fr 1fr; align-items: center; }
        .hero-text { padding: 60px; }
        h1 { font-family: 'Oswald', sans-serif; font-size: clamp(4rem, 10vw, 8rem); line-height: 0.9; text-transform: uppercase; color: var(--gold-matte); margin: 0; }
        .hero-tagline { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.5rem; margin-top: 20px; color: #888; }
        .hero-image { height: 100vh; background-image: url('https://images.unsplash.com/photo-1599351431202-1e0f0137899a?q=80&w=1000&auto=format&fit=crop'); background-size: cover; background-position: center; border-left: 1px solid #333; }

        #servicios { padding: 100px 50px; background-color: #1a1a1a; text-align: center; }
        .section-title { font-family: 'Oswald', sans-serif; font-size: 3rem; color: var(--gold-matte); margin-bottom: 50px; text-transform: uppercase; }
        .servicios-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; max-width: 1200px; margin: 0 auto; }
        .servicio-card { background: rgba(0,0,0,0.3); padding: 40px; border: 1px solid #333; transition: 0.3s var(--ease); }
        .servicio-card:hover { border-color: var(--gold-matte); }
        .servicio-card h3 { font-family: 'Playfair Display', serif; color: var(--gold-matte); font-size: 1.8rem; margin: 0 0 15px 0; }

        #reserva { padding: 100px 20px; max-width: 500px; margin: 0 auto; }
        input, select, button { width: 100%; padding: 18px; margin-bottom: 15px; background: transparent; border: 1px solid #333; color: white; box-sizing: border-box; font-size: 1rem; }
        input:focus, select:focus { border-color: var(--gold-matte); outline: none; }
        button { background: var(--gold-matte); color: black; font-family: 'Oswald', sans-serif; text-transform: uppercase; font-weight: bold; cursor: pointer; border: none; transition: 0.3s; }
        button:hover { background: white; letter-spacing: 2px; }

        @media (max-width: 768px) {
            header { grid-template-columns: 1fr; }
            .hero-image { display: none; }
            .hero-text { text-align: center; padding: 40px 20px; }
            h1 { font-size: 5rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="hero-text">
            <h1>EL<br>ESTILO<br>MAESTRO</h1>
            <p class="hero-tagline">No es solo un corte. Es una declaración de principios.</p>
        </div>
        <div class="hero-image"></div>
    </header>

    <section id="servicios">
        <h2 class="section-title">SERVICIOS DE ÉLITE</h2>
        <div class="servicios-grid">
            <div class="servicio-card"><h3>Corte de Autor</h3><p>Degradados perfectos esculpidos a mano.</p></div>
            <div class="servicio-card"><h3>Barba Premium</h3><p>Perfilado con toalla caliente y navaja.</p></div>
            <div class="servicio-card"><h3>El Ritual</h3><p>Experiencia completa: Corte + Barba + Masaje.</p></div>
        </div>
    </section>

    <section id="reserva">
        <h2 class="section-title">RESERVA TU TURNO</h2>
        <form id="reservaForm">
            <input type="text" id="nombre" placeholder="Nombre Completo" required>
            <input type="tel" id="tel" placeholder="WhatsApp (Ej: +54...)" required>
            <select id="servicio">
                <option value="Corte de Autor">Corte de Autor</option>
                <option value="Barba Premium">Barba Premium</option>
                <option value="El Ritual">El Ritual</option>
            </select>
            <input type="datetime-local" id="fecha" required>
            <button type="submit">Confirmar Cita</button>
        </form>
    </section>

    <script>
        document.getElementById('reservaForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerText = 'PROCESANDO...';

            const data = {
                nombre: document.getElementById('nombre').value,
                telefono: document.getElementById('tel').value,
                servicio: document.getElementById('servicio').value,
                fecha_hora: document.getElementById('fecha').value,
                barbero: "Principal"
            };

            try {
                const response = await fetch('https://cli-barberia-01-api.nexowel.workers.dev/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    alert('¡RESERVA EXITOSA! Nos vemos en la silla.');
                    e.target.reset();
                } else {
                    alert('Error en la reserva. Intenta de nuevo.');
                }
            } catch (error) {
                alert('No se pudo conectar con el servidor.');
            } finally {
                btn.innerText = 'CONFIRMAR CITA';
            }
        });
    </script>
</body>
</html>
