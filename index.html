<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Master Barber | Reserva Online</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37; /* Dorado Clásico */
            --dark: #1a1a1a; /* Negro Mate */
            --light: #f5f5f5; /* Blanco Hueso */
        }
        body { background: var(--dark); color: var(--light); font-family: 'Roboto', sans-serif; margin: 0; }
        header { 
            height: 60vh; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1503951914875-452162b0f3f1?auto=format&fit=crop&q=80');
            background-size: cover; background-position: center; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }
        h1 { font-family: 'Playfair Display', serif; font-size: 3.5rem; color: var(--gold); margin: 0; letter-spacing: 2px; }
        .booking-section { max-width: 600px; margin: -50px auto 50px; background: #222; padding: 40px; border: 1px solid var(--gold); border-radius: 4px; position: relative; }
        .booking-section h2 { text-align: center; color: var(--gold); margin-top: 0; }
        input, select, button { width: 100%; padding: 15px; margin-bottom: 15px; background: transparent; border: 1px solid #444; color: white; border-radius: 2px; box-sizing: border-box; }
        button { background: var(--gold); color: black; font-weight: bold; border: none; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        button:hover { background: #fff; box-shadow: 0 0 20px rgba(212, 175, 55, 0.4); }
        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; max-width: 1000px; margin: 50px auto; padding: 20px; }
        .info-card h3 { color: var(--gold); border-bottom: 1px solid var(--gold); display: inline-block; padding-bottom: 5px; }
    </style>
</head>
<body>

    <header>
        <h1>THE MASTER BARBER</h1>
        <p>Arte, Tradición y Estilo.</p>
    </header>

    <section class="booking-section">
        <h2>RESERVA TU EXPERIENCIA</h2>
        <form id="reservaForm">
            <input type="text" id="nombre" placeholder="Tu Nombre" required>
            <input type="tel" id="tel" placeholder="WhatsApp (Ej: +54...)" required>
            <select id="servicio">
                <option value="Corte de Cabello">Corte de Cabello</option>
                <option value="Barba Premium">Barba Premium</option>
                <option value="Corte + Barba">Corte + Barba</option>
            </select>
            <input type="datetime-local" id="fecha" required>
            <button type="submit">Confirmar Cita Ahora</button>
        </form>
    </section>

    <div class="info-grid">
        <div class="info-card">
            <h3>Nuestra Historia</h3>
            <p>Más de 10 años redefiniendo el estilo masculino. No solo cortamos cabello, esculpimos identidades.</p>
        </div>
        <div class="info-card">
            <h3>Ubicación</h3>
            <p>Calle Falsa 123, Centro.<br>Lunes a Sábados: 10:00 - 20:00</p>
        </div>
    </div>

    <script>
        document.getElementById('reservaForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerText = 'PROCESANDO...';

            const data = {
                nombre: document.getElementById('nombre').value,
                telefono: document.getElementById('tel').value,
                servicio: document.getElementById('servicio').value,
                fecha_hora: document.getElementById('fecha').value,
                barbero: "Principal"
            };

            try {
                // AQUÍ SE CONECTA CON TU WORKER DE CLOUDFLARE
                const response = await fetch('https://cli-barberia-01-api.nexowel.workers.dev/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    alert('¡Reserva exitosa! El barbero se pondrá en contacto contigo.');
                    e.target.reset();
                } else {
                    alert('Error en la reserva. Por favor intenta de nuevo.');
                }
            } catch (error) {
                alert('No se pudo conectar con el sistema. Revisa tu conexión.');
            } finally {
                btn.innerText = 'CONFIRMAR CITA AHORA';
            }
        });
    </script>
</body>
</html>
